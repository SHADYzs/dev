<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StaxGaming</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7, 0 0 20px #6366f1;
    }

    p {
      margin-top: 10px;
      color: #cbd5e1;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 30px;
      background: linear-gradient(45deg, #6366f1, #a855f7);
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px #a855f7;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <header>
    <h1>StaxGaming</h1>
    <p>Comunidad gaming competitiva</p>
    <a href="#" class="btn">Unirse</a>
  </header>

  <footer>
    <p>© 2026 StaxGaming - Todos los derechos reservados</p>
  </footer>

</body>
</html>
